name: Build, Test and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/fx-rate

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      full_version: ${{ steps.version.outputs.full_version }}
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION)
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="${VERSION}.${BUILD_NUMBER}"
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
      
      - name: Build and export image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: fx-rate:test
          outputs: type=docker,dest=/tmp/fx-rate-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: fx-rate-image
          path: /tmp/fx-rate-image.tar
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: fx-rate-image
          path: /tmp

      - name: Load images
        run: docker load -i /tmp/fx-rate-image.tar

      - name: Test CAD to USD for a day
        run: docker run --rm fx-rate:test c -d 20210331

      - name: Test CAD to USD for month end for a year
        run: docker run --rm fx-rate:test c -m 2025

      - name: Test USD to CAD for a day
        run: docker run --rm fx-rate:test u -d 20210601

      - name: Test USD to CAD for month end for a year
        run: docker run --rm fx-rate:test u -m 2023

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.build.outputs.full_version }}
            type=raw,value=${{ needs.build.outputs.version }}
            type=raw,value=${{ needs.build.outputs.major_minor }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

